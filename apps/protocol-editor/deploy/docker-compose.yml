# ResQDocs Protokoll-Editor (statisch) - hinter externem Reverse Proxy (TLS dort).
# Gehaertet: non-root Image, read-only FS, keine Capabilities, keine Eskalation.
#
# Dieser Weg serviert ein VORAB gebautes Bundle: lege das Vite-Build-Ergebnis
# (apps/protocol-editor/dist) als ./site neben diese Datei und mounte es read-only.
services:
  editor:
    image: nginxinc/nginx-unprivileged:alpine
    container_name: resqdocs-editor
    ports:
      - "8081:8081"
    volumes:
      - ./site:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    read_only: true
    tmpfs:
      - /tmp
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "1m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8081/"]
      interval: 30s
      timeout: 5s
      retries: 3
