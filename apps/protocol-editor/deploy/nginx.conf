# Server-Config des Protokoll-Editors (einzige Quelle der Wahrheit).
# HTTP-only auf 8081; TLS/Domain/Zertifikate uebernimmt ein externer Reverse Proxy.
# Verwendet von beiden Auslieferungswegen (siehe deploy/README.md):
#   - Produktion: docker-compose.yml (nginx-unprivileged, gemountet)
#   - Standalone: Dockerfile (image-gebacken), COPY dieser Datei
#
# WICHTIG: absolute_redirect/port_in_redirect aus -> Verzeichnis-Redirects werden
# RELATIV erzeugt. Sonst baut nginx eine absolute URL mit internem Port/Schema
# (http://host:8081/...), die hinter dem Proxy nicht erreichbar ist.
server {
    listen       8081;
    server_name  _;

    absolute_redirect off;
    port_in_redirect  off;

    root  /usr/share/nginx/html;
    index index.html;

    # Security-/Privacy-Header (Policy spiegeln: kein Sniffing, kein Referrer-Leak).
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;

    # Statische Assets lange cachen (Vite-Hashes im Dateinamen). add_header in einer
    # location erbt NICHT vom Server-Block -> Security-Header hier wiederholen.
    location /assets/ {
        expires 1y;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
